<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AJ'S FOCUSFLOW</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <div id="particles-js"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">AJ'S FOCUSFLOW</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="/projects" class="nav-item">
                <i class="fas fa-folder"></i>
                <span>Projects</span>
            </a>
            <a href="/dashboard#tasks" class="nav-item">
                <i class="fas fa-tasks"></i>
                <span>My Tasks</span>
            </a>
            <a href="/analytics" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Analytics</span>
            </a>
            <a href="/profile" class="nav-item active">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
            <a href="#" class="nav-item" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h2>My Profile</h2>
            </div>
            <div class="topbar-right">
                <div class="user-profile">
                    <img src="" alt="User" id="userAvatar" class="user-avatar">
                    <span id="userName">User</span>
                </div>
            </div>
        </header>

        <div class="dashboard-container">
            <!-- Profile Card -->
            <div class="profile-grid">
                <div class="profile-card">
                    <div class="profile-avatar-section">
                        <img src="" alt="Avatar" id="profileAvatar" class="profile-avatar-large">
                        <h3 id="profileName">User Name</h3>
                        <p id="profileEmail">user@email.com</p>
                        <span class="profile-role-badge" id="profileRole">Member</span>
                    </div>
                    <div class="profile-stats-row">
                        <div class="profile-stat">
                            <h4 id="profileProjects">0</h4>
                            <p>Projects</p>
                        </div>
                        <div class="profile-stat">
                            <h4 id="profileTasks">0</h4>
                            <p>Tasks Done</p>
                        </div>
                        <div class="profile-stat">
                            <h4 id="profileHours">0h</h4>
                            <p>Tracked</p>
                        </div>
                    </div>
                </div>

                <div class="profile-settings">
                    <!-- Edit Profile -->
                    <div class="section">
                        <div class="section-header">
                            <h3><i class="fas fa-edit"></i> Edit Profile</h3>
                        </div>
                        <form id="editProfileForm">
                            <div class="form-group">
                                <label>Display Name</label>
                                <input type="text" id="editName" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label>Avatar URL (optional)</label>
                                <input type="url" id="editAvatar" class="form-input" placeholder="https://example.com/avatar.jpg">
                            </div>
                            <button type="submit" class="btn-primary">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                        </form>
                    </div>

                    <!-- Change Password -->
                    <div class="section">
                        <div class="section-header">
                            <h3><i class="fas fa-lock"></i> Change Password</h3>
                        </div>
                        <form id="changePasswordForm">
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" id="currentPassword" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="newPassword" class="form-input" required minlength="6">
                            </div>
                            <div class="form-group">
                                <label>Confirm New Password</label>
                                <input type="password" id="confirmPassword" class="form-input" required minlength="6">
                            </div>
                            <button type="submit" class="btn-primary">
                                <i class="fas fa-key"></i> Update Password
                            </button>
                        </form>
                    </div>

                    <!-- Account Info -->
                    <div class="section">
                        <div class="section-header">
                            <h3><i class="fas fa-info-circle"></i> Account Info</h3>
                        </div>
                        <div class="account-info-grid">
                            <div class="account-info-item">
                                <span class="info-label">Member Since</span>
                                <span class="info-value" id="memberSince">-</span>
                            </div>
                            <div class="account-info-item">
                                <span class="info-label">Last Active</span>
                                <span class="info-value" id="lastActive">-</span>
                            </div>
                            <div class="account-info-item">
                                <span class="info-label">Role</span>
                                <span class="info-value" id="accountRole">Member</span>
                            </div>
                            <div class="account-info-item">
                                <span class="info-label">Status</span>
                                <span class="info-value" style="color: #00ff88;"><i class="fas fa-circle" style="font-size: 8px;"></i> Online</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/particles-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
